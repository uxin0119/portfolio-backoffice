spring.application.name=portfolio-backoffice-backend

# --- Datasource (per-environment) ---
#  local : backend/src/main/resources/application-local.properties (gitignored) with profile 'local'
#  prod  : env vars DB_URL / DB_USERNAME / DB_PASSWORD (Railway)
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# --- JPA / Hibernate ---
# Schema is owned by Flyway; Hibernate only validates against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
