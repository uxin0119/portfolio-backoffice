spring.application.name=portfolio-backoffice-backend

# --- 서버 포트 ---
# PaaS(Koyeb/Render 등)는 PORT 환경변수로 리슨 포트를 주입. 로컬 기본 8080.
server.port=${PORT:8080}

# --- Datasource (per-environment) ---
#  local : backend/src/main/resources/application-local.properties (gitignored) with profile 'local'
#  prod  : env vars DB_URL / DB_USERNAME / DB_PASSWORD (Railway)
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# --- 커넥션 풀 (HikariCP) ---
# Supabase 세션 풀러는 클라이언트 최대 15. 풀을 작게 + 지연 오픈(minimum-idle=0)으로 잡아
# 무료 인스턴스 재배포(구·신 인스턴스 일시 공존) 때도 한도를 넘지 않게 한다.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000

# --- JPA / Hibernate ---
# Schema is owned by Flyway; Hibernate only validates against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health,info

# --- Toss Payments (데모) ---
# 실제 승인에는 본인 Toss 대시보드의 test secret key 필요. 미설정 시 백엔드가 데모 승인으로 폴백.
toss.secret-key=${TOSS_SECRET_KEY:}

# --- 이미지 스토리지 ---
# storage.type: supabase(기본) | local(자체호스트 파일시스템)
storage.type=${STORAGE_TYPE:supabase}
# Supabase Storage (storage.type=supabase): 미설정 시 업로드 건너뜀(폴백)
supabase.url=${SUPABASE_URL:}
supabase.service-key=${SUPABASE_SERVICE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:product-images}
# 로컬 파일 스토리지 (storage.type=local): dir에 저장, base-url로 서빙(nginx 등)
storage.local.dir=${STORAGE_LOCAL_DIR:}
storage.local.base-url=${STORAGE_LOCAL_BASE_URL:}

# --- CORS 허용 오리진 (쉼표 구분) ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
