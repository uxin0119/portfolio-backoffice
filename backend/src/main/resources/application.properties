spring.application.name=portfolio-backoffice-backend

# --- Datasource (per-environment) ---
#  local : backend/src/main/resources/application-local.properties (gitignored) with profile 'local'
#  prod  : env vars DB_URL / DB_USERNAME / DB_PASSWORD (Railway)
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# --- JPA / Hibernate ---
# Schema is owned by Flyway; Hibernate only validates against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health,info

# --- Toss Payments (데모) ---
# 실제 승인에는 본인 Toss 대시보드의 test secret key 필요. 미설정 시 백엔드가 데모 승인으로 폴백.
toss.secret-key=${TOSS_SECRET_KEY:}
